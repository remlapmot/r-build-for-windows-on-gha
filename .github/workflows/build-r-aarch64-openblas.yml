name: Build R for Windows aarch64 (OpenBLAS)

on:
  workflow_dispatch:

env:
  R_VERSION: '4.6.0'
  RTOOLS_VER: '6768'      # Rtools45 toolchain version
  TCLTK_SCRIPTS: '6663'   # Tcl/Tk bundle scripts version (differs from installer)

jobs:
  build:
    runs-on: windows-11-arm
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Install Inno Setup
        shell: powershell
        run: choco install -y innosetup

      - name: Install MiKTeX
        shell: powershell
        run: |
          choco install -y miktex
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" +
                      [System.Environment]::GetEnvironmentVariable("Path","User")
          initexmf --admin --set-config-value=[MPM]AutoInstall=1
          mpm --admin --update-db
          mpm --admin --verbose --install=inconsolata

      - name: Download and install Rtools45 (aarch64)
        shell: powershell
        run: |
          $url = "https://github.com/r-hub/rtools45/releases/download/latest/rtools45-aarch64.exe"
          curl.exe -L --retry 5 --retry-delay 10 --retry-all-errors --fail -o rtools45-aarch64.exe $url
          $log = "$PWD\rtools45-install.log"
          $proc = Start-Process -FilePath ".\rtools45-aarch64.exe" `
            -ArgumentList '/VERYSILENT','/SP-','/SUPPRESSMSGBOXES','/NORESTART',"/LOG=$log" `
            -PassThru
          $timeoutMs = 15 * 60 * 1000
          if (-not $proc.WaitForExit($timeoutMs)) {
            Write-Host "::error::Rtools45 installer did not exit within 15 minutes; killing."
            if (Test-Path $log) { Write-Host "--- rtools45-install.log ---"; Get-Content $log }
            $proc.Kill()
            exit 1
          }
          Write-Host "Installer exit code: $($proc.ExitCode)"
          if (Test-Path $log) { Write-Host "--- rtools45-install.log ---"; Get-Content $log }
          if ($proc.ExitCode -ne 0) { exit $proc.ExitCode }

      - name: Refresh Msys2 package database
        shell: C:\rtools45-aarch64\usr\bin\bash.exe --login -eo pipefail {0}
        run: pacman -Sy --noconfirm wget subversion

      - name: Download R source tarball
        shell: C:\rtools45-aarch64\usr\bin\bash.exe --login -eo pipefail {0}
        run: |
          mkdir -p /c/r-build && cd /c/r-build
          wget "https://cran.r-project.org/src/base/R-4/R-${R_VERSION}.tar.gz"
          tar xzf "R-${R_VERSION}.tar.gz" || true
          mv "R-${R_VERSION}" R-src

      - name: Download Tcl/Tk bundle (aarch64)
        shell: C:\rtools45-aarch64\usr\bin\bash.exe --login -eo pipefail {0}
        run: |
          cd /c/r-build
          BUNDLE="tcltk-aarch64-${RTOOLS_VER}-${TCLTK_SCRIPTS}.zip"
          wget -q "https://cran.r-project.org/bin/windows/Rtools/rtools45/files/${BUNDLE}"
          cd R-src
          unzip -q "../${BUNDLE}"

      - name: Write MkRules.local (aarch64 + OpenBLAS)
        shell: powershell
        run: |
          @"
          ISDIR = C:/Program Files (x86)/Inno Setup 6
          USE_LLVM = 1
          WIN =
          BLAS_LIBS = -lopenblas
          LAPACK_LIBS = -lopenblas
          "@ | Set-Content C:\r-build\R-src\src\gnuwin32\MkRules.local

      - name: Build R
        shell: C:\rtools45-aarch64\usr\bin\bash.exe --login -eo pipefail {0}
        run: |
          export PATH="/aarch64-w64-mingw32.static.posix/bin:${PATH}"
          export PATH="/c/Program Files/MiKTeX/miktex/bin/x64:${PATH}"
          export TAR="/usr/bin/tar"
          export TAR_OPTIONS="--force-local"
          cd /c/r-build/R-src/src/gnuwin32
          make rsync-recommended
          make all recommended
          make distribution

      - name: Stage installer
        shell: powershell
        run: |
          $src = Get-ChildItem C:\r-build\R-src\src\gnuwin32\installer -Filter "R-*.exe" |
                 Select-Object -First 1
          Write-Host "Found installer: $($src.FullName)"
          Copy-Item $src.FullName "R-$env:R_VERSION-aarch64-openblas.exe"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: R-${{ env.R_VERSION }}-aarch64-openblas
          path: R-${{ env.R_VERSION }}-aarch64-openblas.exe
          if-no-files-found: error

      - name: Smoke-test installed R
        shell: powershell
        run: |
          Start-Process -Wait -FilePath ".\R-$env:R_VERSION-aarch64-openblas.exe" `
            -ArgumentList '/VERYSILENT', '/SP-', '/SUPPRESSMSGBOXES', '/NORESTART'
          & "C:\Program Files\R-aarch64\R-$env:R_VERSION\bin\Rscript.exe" -e "utils::sessionInfo()"

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: powershell
        run: |
          $tag = "R-$env:R_VERSION"
          $file = "R-$env:R_VERSION-aarch64-openblas.exe"
          gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $env:GITHUB_REPOSITORY `
              --title $tag --notes "R $env:R_VERSION Windows builds"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "gh release create failed (likely a concurrent run created it); continuing"
              $LASTEXITCODE = 0
            }
          }
          gh release upload $tag $file --repo $env:GITHUB_REPOSITORY --clobber
