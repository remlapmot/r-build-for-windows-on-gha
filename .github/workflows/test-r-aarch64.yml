name: Test R aarch64 - standard vs OpenBLAS

on:
  workflow_dispatch:

env:
  R_VERSION: '4.6.0'

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: windows-11-arm

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download aarch64 R
        shell: powershell
        run: |
          $url = "https://github.com/remlapmot/r-build-for-windows-on-gha/releases/download/R-$env:R_VERSION/R-$env:R_VERSION-aarch64.exe"
          curl.exe -L --retry 5 --retry-delay 10 --retry-all-errors --fail -o R-aarch64.exe $url

      - name: Install aarch64 R
        shell: powershell
        run: |
          Start-Process -Wait -FilePath ".\R-aarch64.exe" `
            -ArgumentList '/VERYSILENT', '/SP-', '/SUPPRESSMSGBOXES', '/NORESTART', '/DIR=C:\R-aarch64'

      - name: Download aarch64 OpenBLAS R
        shell: powershell
        run: |
          $url = "https://github.com/remlapmot/r-build-for-windows-on-gha/releases/download/R-$env:R_VERSION/R-$env:R_VERSION-aarch64-openblas.exe"
          curl.exe -L --retry 5 --retry-delay 10 --retry-all-errors --fail -o R-aarch64-openblas.exe $url

      - name: Install aarch64 OpenBLAS R
        shell: powershell
        run: |
          Start-Process -Wait -FilePath ".\R-aarch64-openblas.exe" `
            -ArgumentList '/VERYSILENT', '/SP-', '/SUPPRESSMSGBOXES', '/NORESTART', '/DIR=C:\R-aarch64-openblas'

      - name: Benchmark aarch64 R
        shell: powershell
        run: |
          & "C:\R-aarch64\bin\Rscript.exe" tests/blas-benchmark.R 2>&1 |
            Tee-Object -FilePath tests/results-aarch64.log

      - name: Benchmark aarch64 OpenBLAS R
        shell: powershell
        run: |
          & "C:\R-aarch64-openblas\bin\Rscript.exe" tests/blas-benchmark.R 2>&1 |
            Tee-Object -FilePath tests/results-aarch64-openblas.log

      - name: Commit results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/results-aarch64.log tests/results-aarch64-openblas.log
          if git diff --staged --quiet; then
            echo "No result changes to commit"
            exit 0
          fi
          git commit -m "chore: update aarch64 benchmark results [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed; sleeping then retrying..."
            sleep $((RANDOM % 10 + 5))
          done
          echo "::error::Failed to push results after 5 attempts"
          exit 1
