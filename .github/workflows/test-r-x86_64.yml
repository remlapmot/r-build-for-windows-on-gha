name: Test R x86_64 - CRAN vs OpenBLAS

on:
  workflow_dispatch:

env:
  R_VERSION: '4.6.0'

permissions:
  contents: write

jobs:
  benchmark:
    runs-on: windows-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Download CRAN R
        shell: powershell
        run: |
          $url = "https://cran.r-project.org/bin/windows/base/R-$env:R_VERSION-win.exe"
          curl.exe -L --retry 5 --retry-delay 10 --retry-all-errors --fail -o R-cran.exe $url

      - name: Install CRAN R
        shell: powershell
        run: |
          Start-Process -Wait -FilePath ".\R-cran.exe" `
            -ArgumentList '/VERYSILENT', '/SP-', '/SUPPRESSMSGBOXES', '/NORESTART', '/DIR=C:\R-cran'

      - name: Download custom OpenBLAS R
        shell: powershell
        run: |
          $url = "https://github.com/remlapmot/r-build-for-windows-on-gha/releases/download/R-$env:R_VERSION/R-$env:R_VERSION-openblas.exe"
          curl.exe -L --retry 5 --retry-delay 10 --retry-all-errors --fail -o R-openblas.exe $url

      - name: Install custom OpenBLAS R
        shell: powershell
        run: |
          Start-Process -Wait -FilePath ".\R-openblas.exe" `
            -ArgumentList '/VERYSILENT', '/SP-', '/SUPPRESSMSGBOXES', '/NORESTART', '/DIR=C:\R-openblas'

      - name: Benchmark CRAN R
        shell: powershell
        run: |
          & "C:\R-cran\bin\Rscript.exe" tests/blas-benchmark.R 2>&1 |
            Tee-Object -FilePath tests/results-x86_64-cran.log

      - name: Benchmark OpenBLAS R
        shell: powershell
        run: |
          & "C:\R-openblas\bin\Rscript.exe" tests/blas-benchmark.R 2>&1 |
            Tee-Object -FilePath tests/results-x86_64-openblas.log

      - name: Commit results
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tests/results-x86_64-cran.log tests/results-x86_64-openblas.log
          if git diff --staged --quiet; then
            echo "No result changes to commit"
            exit 0
          fi
          git commit -m "chore: update x86_64 benchmark results [skip ci]"
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && exit 0
            echo "push attempt $i failed; sleeping then retrying..."
            sleep $((RANDOM % 10 + 5))
          done
          echo "::error::Failed to push results after 5 attempts"
          exit 1
