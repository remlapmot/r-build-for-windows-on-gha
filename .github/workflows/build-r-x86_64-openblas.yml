name: Build R for Windows x86_64 (OpenBLAS)

on:
  workflow_dispatch:

env:
  R_VERSION: '4.6.0'
  RTOOLS_VER: '6768'      # Rtools45 toolchain version
  TCLTK_SCRIPTS: '6663'   # Tcl/Tk bundle scripts version (differs from installer)

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: Uninstall pre-installed R
        shell: powershell
        run: |
          $rRoot = 'C:\Program Files\R'
          if (-not (Test-Path $rRoot)) {
            Write-Host "No pre-installed R found at $rRoot"
            return
          }
          Get-ChildItem $rRoot -Directory | ForEach-Object {
            $dir = $_.FullName
            $u = Join-Path $dir 'unins000.exe'
            if (Test-Path $u) {
              Write-Host "Uninstalling $($_.Name) via $u"
              Start-Process -Wait -FilePath $u `
                -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART'
            } else {
              Write-Host "No unins000.exe in $dir"
            }
            if (Test-Path $dir) {
              Write-Host "Removing leftover directory $dir"
              Remove-Item -Recurse -Force $dir -ErrorAction SilentlyContinue
            }
          }

      - name: Install Inno Setup
        shell: powershell
        run: choco install -y innosetup

      - name: Install MiKTeX
        shell: powershell
        run: |
          choco install -y miktex
          $env:Path = [System.Environment]::GetEnvironmentVariable("Path","Machine") + ";" +
                      [System.Environment]::GetEnvironmentVariable("Path","User")
          initexmf --admin --set-config-value=[MPM]AutoInstall=1

      - name: Download and install Rtools45
        shell: powershell
        run: |
          $want = $env:RTOOLS_VER
          $entries = @(
            Get-ItemProperty `
              HKLM:\Software\Microsoft\Windows\CurrentVersion\Uninstall\*, `
              HKLM:\Software\WOW6432Node\Microsoft\Windows\CurrentVersion\Uninstall\* `
              -ErrorAction SilentlyContinue |
              Where-Object { $_.DisplayName -match 'Rtools' -and $_.DisplayName -match '45' }
          )
          foreach ($e in $entries) {
            Write-Host "Found installed: $($e.DisplayName) version $($e.DisplayVersion)"
          }
          $matched = $entries | Where-Object { "$($_.DisplayVersion)" -match $want } | Select-Object -First 1
          if ($matched) {
            Write-Host "Rtools45 build $want already installed; skipping install."
            exit 0
          }
          foreach ($e in $entries) {
            $exe = $null
            if ($e.UninstallString -match '^"?([^"]+\.exe)"?') {
              $exe = $Matches[1]
            }
            if ($exe -and (Test-Path $exe)) {
              Write-Host "Uninstalling $($e.DisplayName) via $exe"
              Start-Process -Wait -FilePath $exe `
                -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART'
            }
          }
          if (Test-Path C:\rtools45) {
            Write-Host "Removing leftover C:\rtools45"
            Remove-Item -Recurse -Force C:\rtools45 -ErrorAction SilentlyContinue
          }
          $url = "https://github.com/r-hub/rtools45/releases/download/latest/rtools45.exe"
          curl.exe -L --retry 5 --retry-delay 10 --retry-all-errors --fail -o rtools45.exe $url
          $log = "$PWD\rtools45-install.log"
          $proc = Start-Process -FilePath ".\rtools45.exe" `
            -ArgumentList '/VERYSILENT','/SP-','/SUPPRESSMSGBOXES','/NORESTART',"/LOG=$log" `
            -PassThru
          $timeoutMs = 15 * 60 * 1000
          if (-not $proc.WaitForExit($timeoutMs)) {
            Write-Host "::error::Rtools45 installer did not exit within 15 minutes; killing."
            if (Test-Path $log) { Write-Host "--- rtools45-install.log ---"; Get-Content $log }
            $proc.Kill()
            exit 1
          }
          Write-Host "Installer exit code: $($proc.ExitCode)"
          if (Test-Path $log) { Write-Host "--- rtools45-install.log ---"; Get-Content $log }
          if ($proc.ExitCode -ne 0) { exit $proc.ExitCode }

      - name: Refresh Msys2 package database
        shell: C:\rtools45\usr\bin\bash.exe --login -eo pipefail {0}
        run: pacman -Sy --noconfirm wget subversion

      - name: Download R source tarball
        shell: C:\rtools45\usr\bin\bash.exe --login -eo pipefail {0}
        run: |
          mkdir -p /c/r-build && cd /c/r-build
          wget "https://cran.r-project.org/src/base/R-4/R-${R_VERSION}.tar.gz"
          tar xzf "R-${R_VERSION}.tar.gz" || true
          mv "R-${R_VERSION}" R-src

      - name: Download Tcl/Tk bundle (x86_64)
        shell: C:\rtools45\usr\bin\bash.exe --login -eo pipefail {0}
        run: |
          cd /c/r-build
          BUNDLE="tcltk-${RTOOLS_VER}-${TCLTK_SCRIPTS}.zip"
          wget -q "https://cran.r-project.org/bin/windows/Rtools/rtools45/files/${BUNDLE}"
          cd R-src
          unzip -q "../${BUNDLE}"

      - name: Write MkRules.local (OpenBLAS)
        shell: powershell
        run: |
          @"
          ISDIR = C:/Program Files (x86)/Inno Setup 6
          BLAS_LIBS = -lopenblas
          LAPACK_LIBS = -lopenblas
          "@ | Set-Content C:\r-build\R-src\src\gnuwin32\MkRules.local

      - name: Build R
        shell: C:\rtools45\usr\bin\bash.exe --login -eo pipefail {0}
        run: |
          export PATH="/x86_64-w64-mingw32.static.posix/bin:${PATH}"
          export PATH="/c/Program Files/MiKTeX/miktex/bin/x64:${PATH}"
          export TAR="/usr/bin/tar"
          export TAR_OPTIONS="--force-local"
          cd /c/r-build/R-src/src/gnuwin32
          make rsync-recommended
          make all recommended
          make distribution

      - name: Stage installer
        shell: powershell
        run: |
          $src = Get-ChildItem C:\r-build\R-src\src\gnuwin32\installer -Filter "R-*.exe" |
                 Select-Object -First 1
          Write-Host "Found installer: $($src.FullName)"
          Copy-Item $src.FullName "R-$env:R_VERSION-openblas.exe"

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: R-${{ env.R_VERSION }}-x86_64-openblas
          path: R-${{ env.R_VERSION }}-openblas.exe
          if-no-files-found: error

      - name: Smoke-test installed R
        shell: powershell
        run: |
          Start-Process -Wait -FilePath ".\R-$env:R_VERSION-openblas.exe" `
            -ArgumentList '/VERYSILENT', '/SP-', '/SUPPRESSMSGBOXES', '/NORESTART'
          & "C:\Program Files\R\R-$env:R_VERSION\bin\Rscript.exe" -e "utils::sessionInfo()"

      - name: Publish to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: powershell
        run: |
          $tag = "R-$env:R_VERSION"
          $file = "R-$env:R_VERSION-openblas.exe"
          gh release view $tag --repo $env:GITHUB_REPOSITORY 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --repo $env:GITHUB_REPOSITORY `
              --title $tag --notes "R $env:R_VERSION Windows builds"
            if ($LASTEXITCODE -ne 0) {
              Write-Host "gh release create failed (likely a concurrent run created it); continuing"
              $LASTEXITCODE = 0
            }
          }
          gh release upload $tag $file --repo $env:GITHUB_REPOSITORY --clobber
